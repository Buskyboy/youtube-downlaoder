name: Build macOS Application

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the build

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install ffmpeg
      run: |
        brew install ffmpeg

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Application with PyInstaller
      run: |
        pyinstaller --onefile --windowed --osx-bundle-identifier=com.youtube-downloader myDownloader.py

    - name: Create DMG (Disk Image)
      run: |
        brew install create-dmg
        create-dmg \
          --volname "YouTube Downloader" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "myDownloader.app" 200 190 \
          "dist/YouTube-Downloader.dmg" \
          "dist/myDownloader.app"

    - name: Upload macOS Application Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YouTube-Downloader-macOS.dmg
        path: dist/YouTube-Downloader.dmg
